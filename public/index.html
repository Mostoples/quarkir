<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1d4ed8" />
<title>QuParkir — Parkir Digital Surakarta</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🅿️</text></svg>" />

<!-- OpenStreetMap / Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<link rel="stylesheet" href="assets/css/tokens.css" />
<link rel="stylesheet" href="assets/css/app.css" />
</head>
<body data-mode="aurora">
  <div class="aurora" aria-hidden="true"></div>

  <!-- App column -->
  <div class="app" id="app">
    <div class="scroll" id="view"><!-- halaman dirender di sini --></div>

    <!-- Bottom nav (disembunyikan di halaman login) -->
    <nav class="tabbar" id="tabbar" aria-label="Navigasi utama" hidden>
      <button data-go="#/home" class="active"><span>🏠</span><small>Home</small></button>
      <button data-go="#/riwayat"><span>🕘</span><small>Aktivitas</small></button>
      <div class="fab-slot"><button class="fab" id="fabScan" title="Scan & Check-in">▣</button></div>
      <button data-go="#/cari"><span>🗺️</span><small>Cari</small></button>
      <button data-go="#/akun"><span>👤</span><small>Akun</small></button>
    </nav>
  </div>

  <!-- mode switcher -->
  <div class="modefab" id="modefab" role="tablist" aria-label="Mode tampilan">
    <button data-set="aurora" class="active">Aurora</button>
    <button data-set="glass">Glass</button>
    <button data-set="neumorph">Neumorph</button>
  </div>

  <!-- toast + modal host -->
  <div id="toast" class="toast"></div>
  <div id="modalHost"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
