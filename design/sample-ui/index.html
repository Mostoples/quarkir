<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>QuParkir — Sample UI (Cari Parkir)</title>

<!-- OpenStreetMap via Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<style>
/* ============================================================
   QuParkir — Sample UI
   Multimode: Aurora (background) + Glassmorphism (panel) + Neumorphism (kontrol)
   Palet: Blue (acuan lampiran)
   ============================================================ */
:root{
  --blue-950:#0b1b4d; --blue-900:#13257a; --blue-800:#1e3a8a;
  --blue-700:#1d4ed8; --blue-600:#2563eb; --blue-500:#3b82f6;
  --blue-400:#60a5fa; --blue-300:#93c5fd; --blue-200:#bfdbfe;
  --cyan-500:#06b6d4; --cyan-400:#22d3ee; --sky:#e0f2fe;
  --success:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  --ink:#0b1220; --muted:#5b6b8c;

  --r-lg:24px; --r-md:16px; --r-sm:12px;

  /* token yang berubah per-mode */
  --page-bg:#0a1750;
  --panel-bg:rgba(255,255,255,.14);
  --panel-border:rgba(255,255,255,.35);
  --panel-blur:18px;
  --panel-shadow:0 10px 40px rgba(8,20,70,.35);
  --text:#0b1220;
  --text-on-dark:#eaf2ff;
  --chip-bg:rgba(255,255,255,.55);
  --control-bg:#eaf1ff;
  --control-shadow:6px 6px 14px rgba(10,23,80,.18), -6px -6px 14px rgba(255,255,255,.9);
  --aurora-opacity:1;
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
  color:var(--text-on-dark);
  background:var(--page-bg);
  overflow-x:hidden;
}

/* ---------- AURORA BACKGROUND ---------- */
.aurora{position:fixed; inset:0; z-index:-2; overflow:hidden; opacity:var(--aurora-opacity); transition:opacity .5s}
.aurora::before{content:""; position:absolute; inset:-10%;
  background:
   radial-gradient(40% 40% at 20% 25%, #2563eb 0%, transparent 60%),
   radial-gradient(45% 45% at 80% 20%, #06b6d4 0%, transparent 60%),
   radial-gradient(50% 50% at 70% 80%, #1d4ed8 0%, transparent 60%),
   radial-gradient(40% 40% at 25% 85%, #22d3ee 0%, transparent 55%);
  filter:blur(70px) saturate(140%);
  animation:drift 18s ease-in-out infinite alternate;
}
.aurora::after{content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(7,18,64,.25), rgba(7,18,64,.65));}
@keyframes drift{
  0%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(2%, -2%,0) scale(1.08)}
  100%{transform:translate3d(-2%,2%,0) scale(1.04)}
}
@media (prefers-reduced-motion: reduce){ .aurora::before{animation:none} }

/* ---------- LAYOUT ---------- */
.app{min-height:100dvh; display:flex; flex-direction:column}
.topbar{
  display:flex; align-items:center; gap:14px; padding:14px clamp(14px,3vw,28px);
  position:sticky; top:0; z-index:20;
}
.brand{display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.3px; font-size:1.15rem}
.brand .logo{
  width:38px; height:38px; border-radius:12px; display:grid; place-items:center;
  background:linear-gradient(135deg,var(--cyan-400),var(--blue-600));
  box-shadow:0 6px 18px rgba(37,99,235,.5); font-size:20px;
  animation:floaty 3.5s ease-in-out infinite;
}
@keyframes floaty{50%{transform:translateY(-4px)}}
.spacer{flex:1}

/* mode switcher */
.modes{display:flex; gap:6px; padding:6px; border-radius:999px;
  background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.25); backdrop-filter:blur(10px)}
.modes button{
  border:0; cursor:pointer; padding:8px 14px; border-radius:999px; font-weight:600; font-size:.82rem;
  color:var(--text-on-dark); background:transparent; transition:.2s;
}
.modes button.active{background:#fff; color:var(--blue-700); box-shadow:0 4px 12px rgba(0,0,0,.18)}

.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#93c5fd,#2563eb);
  display:grid;place-items:center;font-weight:700;border:2px solid rgba(255,255,255,.6)}

.layout{flex:1; display:grid; gap:18px; padding:0 clamp(14px,3vw,28px) 96px;
  grid-template-columns:1.6fr .9fr; align-items:start}
@media (max-width:900px){ .layout{grid-template-columns:1fr} }

/* ---------- PANEL (GLASS) ---------- */
.panel{
  background:var(--panel-bg);
  border:1px solid var(--panel-border);
  border-radius:var(--r-lg);
  box-shadow:var(--panel-shadow);
  backdrop-filter:blur(var(--panel-blur)) saturate(130%);
  -webkit-backdrop-filter:blur(var(--panel-blur)) saturate(130%);
  color:var(--text-on-dark);
  overflow:hidden;
}
.panel.pad{padding:18px}
.panel-title{display:flex;align-items:center;gap:10px;font-weight:700;margin:0 0 12px;font-size:1.02rem}
.panel-title .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan-400);box-shadow:0 0 0 4px rgba(34,211,238,.25);animation:pulse 1.8s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 8px rgba(34,211,238,0)}}

/* ---------- MAP ---------- */
.map-wrap{position:relative; height:clamp(320px,52vh,560px)}
#map{position:absolute; inset:0}
.map-wrap .overlay-search{
  position:absolute; z-index:5; top:14px; left:14px; right:14px; display:flex; gap:10px;
}
.search{
  flex:1; display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:14px;
  background:rgba(255,255,255,.85); color:var(--ink); font-weight:500;
  box-shadow:0 8px 24px rgba(8,20,70,.25); backdrop-filter:blur(6px);
}
.search input{border:0;outline:0;background:transparent;flex:1;font-size:.95rem;color:var(--ink)}

/* marker pin */
.pin{position:relative; width:34px;height:34px}
.pin .body{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  background:linear-gradient(135deg,var(--cyan-400),var(--blue-600));
  box-shadow:0 6px 14px rgba(8,20,70,.45);display:grid;place-items:center}
.pin .body span{transform:rotate(45deg);color:#fff;font-weight:800;font-size:.72rem}
.pin.full .body{background:linear-gradient(135deg,#fb7185,#ef4444)}
.pin::after{content:"";position:absolute;left:50%;top:34px;width:14px;height:6px;border-radius:50%;
  transform:translateX(-50%);background:rgba(0,0,0,.25);filter:blur(2px)}

/* ---------- SIDE CARDS ---------- */
.side{display:flex; flex-direction:column; gap:16px}

/* status aktif */
.status-card{padding:18px;position:relative}
.status-empty{display:flex;gap:12px;align-items:center}
.status-empty .ic{font-size:30px;animation:floaty 3s ease-in-out infinite}
.status-active .row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.timer{font-size:2rem;font-weight:800;letter-spacing:1px;font-variant-numeric:tabular-nums}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:.74rem;font-weight:700}
.badge.ok{background:rgba(34,197,94,.2);color:#bbf7d0;border:1px solid rgba(34,197,94,.5)}

/* vehicle selector (neumorph) */
.veh{display:flex;gap:10px;flex-wrap:wrap}
.veh button{
  flex:1; min-width:120px; cursor:pointer; border:0; border-radius:var(--r-md); padding:14px;
  display:flex; align-items:center; gap:10px; font-weight:600; color:var(--blue-800);
  background:var(--control-bg); box-shadow:var(--control-shadow); transition:.18s;
}
.veh button .emoji{font-size:22px}
.veh button.active{color:#fff;background:linear-gradient(135deg,var(--blue-600),var(--cyan-500));
  box-shadow:0 10px 22px rgba(37,99,235,.45)}
.veh button:active{transform:translateY(1px)}
.veh small{display:block;font-weight:500;color:var(--muted);font-size:.72rem}
.veh button.active small{color:rgba(255,255,255,.85)}

/* live slot list */
.slot{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--r-md);
  background:var(--chip-bg);color:var(--ink);margin-bottom:10px;transition:.18s;cursor:pointer;border:1px solid transparent}
.slot:hover{transform:translateY(-2px);border-color:var(--blue-300)}
.slot .name{font-weight:700;font-size:.92rem}
.slot .meta{font-size:.74rem;color:var(--muted)}
.slot .right{margin-left:auto;text-align:right}
.slot .count{font-weight:800;font-size:1.05rem;color:var(--blue-700)}
.slot .count.low{color:var(--danger)}
.bar{height:6px;border-radius:6px;background:#dbe6ff;overflow:hidden;margin-top:6px;width:120px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-500),var(--blue-600))}

/* CTA */
.cta{display:flex;gap:10px;margin-top:4px}
.btn{flex:1;cursor:pointer;border:0;border-radius:var(--r-md);padding:16px;font-weight:800;font-size:1rem;
  color:#fff;background:linear-gradient(135deg,var(--blue-600),var(--cyan-500));
  box-shadow:0 12px 26px rgba(37,99,235,.5);transition:.18s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn:hover{transform:translateY(-2px)}
.btn.ghost{background:var(--control-bg);color:var(--blue-700);box-shadow:var(--control-shadow);flex:0 0 58px}

/* bottom nav (mobile) */
.tabbar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:6px;
  padding:8px;border-radius:999px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
  backdrop-filter:blur(14px);box-shadow:0 12px 30px rgba(8,20,70,.4)}
.tabbar button{border:0;background:transparent;color:var(--text-on-dark);cursor:pointer;
  width:52px;height:46px;border-radius:999px;display:grid;place-items:center;font-size:18px;gap:2px}
.tabbar button.active{background:#fff;color:var(--blue-700)}
.tabbar button small{font-size:.58rem;font-weight:700}

/* ============ MODE OVERRIDES ============ */
/* GLASS: blur kuat, background tenang */
body[data-mode="glass"]{ --page-bg:#0e2a6b; --aurora-opacity:.45;
  --panel-bg:rgba(255,255,255,.10); --panel-border:rgba(255,255,255,.4); --panel-blur:26px; }

/* NEUMORPH: permukaan solid terang, shadow lembut, minim transparansi */
body[data-mode="neumorph"]{ --page-bg:#dfe9fb; --aurora-opacity:0; --text-on-dark:#16306b;
  --panel-bg:#e6eefc; --panel-border:rgba(255,255,255,.7); --panel-blur:0px;
  --panel-shadow:10px 10px 24px rgba(10,23,80,.16), -10px -10px 24px rgba(255,255,255,.95);
  --chip-bg:#e6eefc; --control-bg:#e6eefc;}
body[data-mode="neumorph"] .topbar .modes{background:#e6eefc;border-color:#fff;box-shadow:var(--control-shadow)}
body[data-mode="neumorph"] .slot{box-shadow:inset 4px 4px 10px rgba(10,23,80,.12), inset -4px -4px 10px #fff}
body[data-mode="neumorph"] .panel-title .dot{box-shadow:0 0 0 4px rgba(34,211,238,.2)}

/* AURORA: paling vivid (default) */
body[data-mode="aurora"]{ --aurora-opacity:1; }
</style>
</head>

<body data-mode="aurora">
  <div class="aurora" aria-hidden="true"></div>

  <div class="app">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="brand"><span class="logo">🅿️</span> QuParkir</div>
      <div class="spacer"></div>
      <div class="modes" role="tablist" aria-label="Mode tampilan">
        <button data-set="aurora" class="active">Aurora</button>
        <button data-set="glass">Glass</button>
        <button data-set="neumorph">Neumorph</button>
      </div>
      <div class="avatar" title="Akun">AW</div>
    </header>

    <!-- MAIN -->
    <main class="layout">
      <!-- MAP -->
      <section class="panel map-wrap" aria-label="Peta parkir">
        <div class="overlay-search">
          <label class="search">
            <span>🔎</span>
            <input type="text" placeholder="Cari lokasi parkir di Surakarta…" />
          </label>
        </div>
        <div id="map"></div>
      </section>

      <!-- SIDE -->
      <aside class="side">
        <!-- Status Parkir Aktif -->
        <div class="panel status-card status-empty" id="statusCard">
          <div class="ic">🚗</div>
          <div>
            <div style="font-weight:700">Belum ada parkir aktif</div>
            <div style="opacity:.8;font-size:.85rem">Pilih kendaraan & lokasi, lalu check-in.</div>
          </div>
        </div>

        <!-- Pilih Kendaraan (Neumorph control) -->
        <div class="panel pad">
          <h3 class="panel-title"><span class="dot"></span> Pilih Kendaraan</h3>
          <div class="veh">
            <button class="active"><span class="emoji">🏍️</span><span>Motor<small>AD 1234 XY</small></span></button>
            <button><span class="emoji">🚙</span><span>Mobil<small>AD 5678 ZZ</small></span></button>
          </div>
        </div>

        <!-- Live Slot Availability -->
        <div class="panel pad">
          <h3 class="panel-title"><span class="dot"></span> Live Slot Terdekat</h3>
          <div id="slotList"></div>
        </div>

        <!-- CTA -->
        <div class="cta">
          <button class="btn">📷 Scan QR & Check-in</button>
          <button class="btn ghost" title="Bantuan">🆘</button>
        </div>
      </aside>
    </main>
  </div>

  <!-- bottom nav -->
  <nav class="tabbar" aria-label="Navigasi">
    <button class="active"><span>🗺️</span><small>Cari</small></button>
    <button><span>⏱️</span><small>Aktif</small></button>
    <button><span>🧾</span><small>Riwayat</small></button>
    <button><span>👤</span><small>Akun</small></button>
  </nav>

<script>
/* ---------- Mode switcher (multimode) ---------- */
const modeBtns = document.querySelectorAll('.modes button');
modeBtns.forEach(b=>b.addEventListener('click',()=>{
  document.body.dataset.mode = b.dataset.set;
  modeBtns.forEach(x=>x.classList.toggle('active', x===b));
  setTimeout(()=>map && map.invalidateSize(), 300);
}));

/* ---------- Data contoh kantong parkir (Surakarta) ---------- */
const lots = [
  {name:"Pasar Gede",        lat:-7.5697, lng:110.8307, cap:40, used:32, tarif:"Rp2.000/jam"},
  {name:"Solo Grand Mall",   lat:-7.5663, lng:110.8126, cap:120,used:140-69, tarif:"Rp3.000/jam"},
  {name:"Stasiun Balapan",   lat:-7.5562, lng:110.8190, cap:60, used:58, tarif:"Rp2.000/jam"},
  {name:"Benteng Vastenburg",lat:-7.5719, lng:110.8290, cap:50, used:12, tarif:"Rp2.000/jam"},
  {name:"Kampus UNS",        lat:-7.5599, lng:110.8561, cap:200,used:90, tarif:"Rp1.000/jam"},
];

/* ---------- Leaflet + OpenStreetMap ---------- */
const map = L.map('map',{zoomControl:true}).setView([-7.5755,110.8243], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'&copy; OpenStreetMap'
}).addTo(map);

function pinIcon(full){
  return L.divIcon({className:'', html:`<div class="pin ${full?'full':''}"><div class="body"><span>P</span></div></div>`,
    iconSize:[34,40], iconAnchor:[17,40], popupAnchor:[0,-38]});
}

/* ---------- Render markers + live slot list ---------- */
const slotList = document.getElementById('slotList');
lots.forEach(l=>{
  const avail = Math.max(0, l.cap - l.used);
  const full = avail===0;
  const low = avail>0 && avail<=5;
  L.marker([l.lat,l.lng],{icon:pinIcon(full)}).addTo(map)
    .bindPopup(`<b>${l.name}</b><br>Sisa slot: <b>${avail}</b> / ${l.cap}<br>${l.tarif}`);

  const pct = Math.round((l.used/l.cap)*100);
  const el = document.createElement('div');
  el.className='slot';
  el.innerHTML = `
    <div style="font-size:22px">${full?'🚧':'🅿️'}</div>
    <div>
      <div class="name">${l.name}</div>
      <div class="meta">${l.tarif}</div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>
    <div class="right">
      <div class="count ${(full||low)?'low':''}">${avail}</div>
      <div class="meta">slot</div>
    </div>`;
  el.addEventListener('click',()=>{ map.flyTo([l.lat,l.lng],16); });
  slotList.appendChild(el);
});

/* ---------- Demo: pilih kendaraan ---------- */
document.querySelectorAll('.veh button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.veh button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
}));
</script>
</body>
</html>
