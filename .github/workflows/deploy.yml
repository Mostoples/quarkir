name: Deploy to Firebase Hosting

# Auto-deploy: setiap push ke main akan men-deploy folder public/ ke Firebase Hosting.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  checks: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy ke Firebase Hosting (channel live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          # Buat secret ini di: Settings > Secrets and variables > Actions
          # Isi dengan JSON service account BARU (hasil rotate), JANGAN yang lama.
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_QUPARKIR }}
          channelId: live
          projectId: quparkir
